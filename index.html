<script>
const MAPBOX_TOKEN = 'pk.eyJ1Ijoic2FtbW9udGllIiwiYSI6ImNtbnF5YTg1aTBkNTUycG9jemUwbG4yeDkifQ.7amxg2xA46W7Gt-_yXm57g';

mapboxgl.accessToken = MAPBOX_TOKEN;

const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/light-v11',
    center: [175, -37],
    zoom: 6
});

map.on('load', async () => {

    const response = await fetch(
        `https://api.mapbox.com/datasets/v1/sammontie/cmnqy347565zm1mlk0enj2iwi/features?access_token=$pk.eyJ1Ijoic2FtbW9udGllIiwiYSI6ImNtbnF5YTg1aTBkNTUycG9jemUwbG4yeDkifQ.7amxg2xA46W7Gt-_yXm57g`
    );

    const geojson = await response.json();

    map.addSource('customers', {
        type: 'geojson',
        data: geojson
    });

    map.addLayer({
    id: 'customer-points',
    type: 'circle',
    source: 'customers',

    paint: {
        'circle-radius': 20,
        'circle-color': '#FF0000'
    }
});

    map.on('click', 'customer-points', (e) => {

        const props = e.features[0].properties;

        new mapboxgl.Popup()
            .setLngLat(e.lngLat)
            .setHTML(
                `<strong>${props.customer_name}</strong><br>Status: ${props.status}`
            )
            .addTo(map);

    });

});
</script>
