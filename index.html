<script>
const MAPBOX_TOKEN = 'pk.eyJ1Ijoic2FtbW9udGllIiwiYSI6ImNtbnF5YTg1aTBkNTUycG9jemUwbG4yeDkifQ.7amxg2xA46W7Gt-_yXm57g';

mapboxgl.accessToken = MAPBOX_TOKEN;

const map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/light-v11',
    center: [175, -37],
    zoom: 6
});

map.on('load', async () => {

    const response = await fetch(
        `https://api.mapbox.com/datasets/v1/sammontie/cmnqy347565zm1mlk0enj2iwi/features?access_token=$pk.eyJ1Ijoic2FtbW9udGllIiwiYSI6ImNtbnF5YTg1aTBkNTUycG9jemUwbG4yeDkifQ.7amxg2xA46W7Gt-_yXm57g`
    );

    const geojson = await response.json();

    map.addSource('customers', {
        type: 'geojson',
        data: geojson
    });

    map.addLayer({
        id: 'customer-points',
        type: 'circle',
        source: 'customers',

        paint: {
            'circle-radius': 8,
            'circle-stroke-width': 1.5,
            'circle-stroke-color': '#ffffff',

            'circle-color': [
                'match',
                ['get', 'status'],

                'Halter Customer', '#6FBF73',
                'Closed Lost', '#E9B59A',
                'Do not contact - poor sentiment', '#B30000',
                'To Prospect', '#66A9E8',
                'No immediate action - in negotiation', '#E8C96B',
                'To re-engage', '#A9C9D6',
                'No Longer A Farm', '#C00000',
                'Corporate Farm', '#5C4423',
                'Not in my Halter area', '#444444',
                'Competitor Collar', '#CCCCCC',

                '#999999'
            ]
        }
    });

    map.on('click', 'customer-points', (e) => {

        const props = e.features[0].properties;

        new mapboxgl.Popup()
            .setLngLat(e.lngLat)
            .setHTML(
                `<strong>${props.customer_name}</strong><br>Status: ${props.status}`
            )
            .addTo(map);

    });

});
</script>
